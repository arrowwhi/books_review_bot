services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: books_bot
      POSTGRES_USER: books
      POSTGRES_PASSWORD: books
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U books"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build:
      context: .
      target: dev
    env_file: .env
    volumes:
      - .:/app
      - go_cache:/root/go
    depends_on:
      postgres:
        condition: service_healthy
    profiles: [dev]

  bot-prod:
    build:
      context: .
      target: prod
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    profiles: [prod]

volumes:
  pg_data:
  go_cache:
